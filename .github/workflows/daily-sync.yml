name: Daily Catalog Sync

on:
  schedule:
    - cron: '0 3 * * *' # 3:00 AM todos los días
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  sync-catalog:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4
      
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Ejecutar script de actualización (Precios y Componentes)
      run: |
        node tools/sync.mjs
        
    - name: Commit y Push de los cambios a Vercel
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add assets/js/builder.js
        git commit -m "chore: actualizacion automatica de precios de componentes" || exit 0
        git push
